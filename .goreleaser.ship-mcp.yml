project_name: ship-mcp

builds:
  - id: ship-mcp
    main: ./tools/mcp/ship/cmd/ship-mcp
    binary: ship-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: ship-mcp-archives
    builds:
      - ship-mcp
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "ship-mcp_checksums.txt"
