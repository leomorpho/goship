name: Test

# TODO: Earthly (which I've used before) can be used to create platform-agnostic CI tests,
# in case we want to move away from Github seamlessly.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Nilaway
        run: go run go.uber.org/nilaway/cmd/nilaway@latest ./...

      - name: Stateless quality gate
        run: bash tools/scripts/precommit-tests.sh

  module_isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Module isolation
        run: make test-module-isolation

  sql_portability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: SQL portability
        run: make test-sql-portability

  generator_contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Generator contracts
        run: make test-generator-contracts

  alpha_contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Alpha contract
        run: make test-alpha-contracts

  doc_sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Doc sync
        run: make test-doc-sync

  doc_drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Doc drift
        run: make test-doc-drift

  agent_evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Agent evals
        run: make test-agent-evals

      - name: Upload agent eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-eval-report
          path: artifacts/agent-eval-report.json
          if-no-files-found: error

  dead_route_regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Dead route regression
        run: make test-dead-routes

  bootstrap_budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Bootstrap budget
        run: make test-bootstrap-budget

  fresh_app_ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Fresh app CI lane
        run: make test-fresh-app-ci

  verify_strict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install nilaway
        run: go install go.uber.org/nilaway/cmd/nilaway@latest

      - name: Strict verify
        run: go run ./tools/cli/ship/cmd/ship verify --profile strict

  startup_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Startup smoke
        run: go test ./tools/cli/ship/internal/commands -run TestFreshAppStartupSmoke -count=1

  upgrade_readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Upgrade readiness contracts
        run: go test ./tools/cli/ship/internal/commands -run 'TestRunUpgrade_JSONReadinessReport_RedSpec|TestRunUpgrade_RejectsUnsupportedContractVersion_RedSpec' -count=1

  cleanroom_bob_verification:
    needs: backend_tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Clean-room Bob/Goose verification
        run: bash tools/scripts/test-cleanroom.sh

  e2e_smoke:
    needs: backend_tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright dependencies
        run: |
          cd tests/e2e
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E smoke
        run: |
          cd tests/e2e
          npm run test:smoke

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-smoke-report
          path: |
            tests/e2e/playwright-report
            tests/e2e/test-results
          retention-days: 7

  cherie_compatibility_smoke:
    needs: [verify_strict, startup_smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright dependencies
        run: |
          cd tests/e2e
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Cherie compatibility smoke
        run: |
          cd tests/e2e
          npm run test:cherie-smoke

      - name: Upload Cherie Playwright artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-cherie-smoke-report
          path: |
            tests/e2e/playwright-report
            tests/e2e/test-results
          retention-days: 7

  top_level_fresh_app:
    if: ${{ always() }}
    needs: [fresh_app_ci]
    runs-on: ubuntu-latest
    steps:
      - name: Fresh app lane status
        run: test "${{ needs.fresh_app_ci.result }}" = "success"

  top_level_upgrades:
    if: ${{ always() }}
    needs: [upgrade_readiness]
    runs-on: ubuntu-latest
    steps:
      - name: Upgrade lane status
        run: test "${{ needs.upgrade_readiness.result }}" = "success"

  top_level_batteries:
    if: ${{ always() }}
    needs: [module_isolation, sql_portability, generator_contracts]
    runs-on: ubuntu-latest
    steps:
      - name: Batteries lane status
        run: |
          test "${{ needs.module_isolation.result }}" = "success"
          test "${{ needs.sql_portability.result }}" = "success"
          test "${{ needs.generator_contracts.result }}" = "success"

  top_level_standalone_operations:
    if: ${{ always() }}
    needs: [bootstrap_budget, startup_smoke, cleanroom_bob_verification]
    runs-on: ubuntu-latest
    steps:
      - name: Standalone operations lane status
        run: |
          test "${{ needs.bootstrap_budget.result }}" = "success"
          test "${{ needs.startup_smoke.result }}" = "success"
          test "${{ needs.cleanroom_bob_verification.result }}" = "success"
