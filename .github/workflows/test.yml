name: Test

# TODO: Earthly (which I've used before) can be used to create platform-agnostic CI tests,
# in case we want to move away from Github seamlessly.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Nilaway
        run: go run go.uber.org/nilaway/cmd/nilaway@latest ./...

      - name: Stateless quality gate
        run: bash tools/scripts/precommit-tests.sh

  cleanroom_bob_verification:
    needs: backend_tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Clean-room Bob/Goose verification
        run: bash tools/scripts/test-cleanroom.sh

  e2e_smoke:
    needs: backend_tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright dependencies
        run: |
          cd tests/e2e
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E smoke
        run: |
          cd tests/e2e
          npm run test:smoke

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-smoke-report
          path: |
            tests/e2e/playwright-report
            tests/e2e/test-results
          retention-days: 7
